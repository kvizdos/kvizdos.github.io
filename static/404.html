<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>404 · Page Not Found</title>
        <meta name="description" content="Looks like this page wandered off." />

        <link rel="icon" type="image/png" href="/assets/favicon.png" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="/assets/style.css" />
    </head>

    <body class="bg-white">
        <header
            class="mt-8 sm:mt-12 contained mb-12 pb-8 border-b border-slate-100"
        >
            <div
                class="flex items-center justify-between text-xs font-content text-slate-600"
            >
                <a
                    href="/"
                    class="flex items-center gap-3 hover:text-primary-600"
                >
                    <img
                        src="/assets/icon.webp"
                        alt="Kenton Vizdos"
                        class="w-6 rounded-full"
                    />
                    <span>Kenton Vizdos</span>
                </a>

                <a href="/" class="hover:text-primary-600"> ← Back to home </a>
            </div>
        </header>

        <main class="contained max-w-3xl py-16">
            <p
                class="font-content text-sm font-semibold uppercase tracking-[0.2em] text-primary-600"
            >
                Error 404
            </p>

            <h1
                class="mt-4 font-header text-5xl font-bold leading-tight text-primary-900"
            >
                Looks like this page doesn't exist.
            </h1>

            <p
                class="mt-6 max-w-2xl font-content text-lg leading-8 text-slate-700"
            >
                Maybe the URL changed. Maybe I deleted the post. Maybe you found
                a broken link. Either way, there's nothing here anymore.
            </p>
        </main>
    </body>
</html>
